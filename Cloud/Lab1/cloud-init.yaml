#cloud-config
package_upgrade: true

packages:
  - nginx
  - ufw

write_files:
  - content: |
      <!DOCTYPE html>
      <html lang="en">
      <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>VilniusTech Cloud Lab</title>
          <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body {
                  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                  color: #333;
                  min-height: 100vh;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  padding: 20px;
              }
              .card {
                  background: rgba(255,255,255,0.95);
                  padding: 40px;
                  border-radius: 16px;
                  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
                  max-width: 600px;
                  width: 100%;
                  text-align: center;
              }
              .logo { font-size: 48px; margin-bottom: 10px; }
              h1 { color: #4a5568; font-size: 28px; margin-bottom: 8px; }
              .subtitle { color: #718096; font-size: 14px; margin-bottom: 24px; }
              .info { text-align: left; margin-top: 20px; }
              .info p {
                  padding: 10px 16px;
                  border-left: 3px solid #667eea;
                  margin-bottom: 8px;
                  background: #f7fafc;
                  border-radius: 0 8px 8px 0;
                  font-size: 14px;
              }
              .info strong { color: #4a5568; }
              footer { margin-top: 24px; font-size: 12px; color: #a0aec0; }
          </style>
      </head>
      <body>
          <div class="card">
              <div class="logo">🏛️</div>
              <h1>VilniusTech Cloud Lab</h1>
              <p class="subtitle">Integrated Services Networks &amp; Cloud Technologies</p>
              <div class="info">
                  <p><strong>Student:</strong> Mark</p>
                  <p><strong>Lab:</strong> IaaS — Virtual Machines on Azure</p>
                  <p><strong>OS:</strong> Ubuntu 22.04 LTS</p>
                  <p><strong>Provisioned with:</strong> OpenTofu (IaC)</p>
              </div>
              <footer>&copy; 2026 VilniusTech &mdash; Laboratory Work 01</footer>
          </div>
      </body>
      </html>
    path: /var/www/html/index.html
    permissions: '0644'

runcmd:
  # Configure UFW firewall (lab requirement)
  - ufw allow 22/tcp
  - ufw allow 80/tcp
  - ufw --force enable
  # Enable and start Nginx
  - systemctl enable nginx
  - systemctl restart nginx
