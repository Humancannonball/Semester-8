<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VilniusTech PaaS Lab</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.95);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        .logo { font-size: 48px; margin-bottom: 10px; }
        h1 { color: #d35400; font-size: 28px; margin-bottom: 8px; }
        .subtitle { color: #e67e22; font-size: 14px; margin-bottom: 24px; font-weight: bold; }
        .info { text-align: left; margin-top: 20px; }
        .info p {
            padding: 10px 16px;
            border-left: 3px solid #f39c12;
            margin-bottom: 8px;
            background: #fff8e1;
            border-radius: 0 8px 8px 0;
            font-size: 14px;
        }
        .info strong { color: #d35400; }
        footer { margin-top: 24px; font-size: 12px; color: #7f8c8d; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">☁️</div>
        <h1>VilniusTech Cloud Lab</h1>
        <p class="subtitle">Platform as a Service (PaaS)</p>
        <div class="info">
            <p><strong>Student:</strong> Mark</p>
            <p><strong>Lab:</strong> 02 — PaaS Resources on Azure</p>
            <p><strong>Environment:</strong> Azure App Service (Linux Web App)</p>
            <p><strong>CI/CD:</strong> GitHub Actions</p>
        </div>
        <footer>&copy; 2026 VilniusTech &mdash; Laboratory Work 02 (PaaS)</footer>
    </div>
</body>
</html>
